; Protocol Test Keyboard Matrix
; For Elite-C Pro Micro (ATmega32U4)
;
; License: CC BY-NC-SA 4.0
; https://github.com/sammothxc/clackpaq

[env:elite_c]
platform = atmelavr
board = sparkfun_promicro16
framework = arduino
monitor_speed = 9600

upload_port = /dev/ttyUSB0

; Build flags
build_flags = 
    -D F_CPU=16000000L
    -O2

; Serial monitor
monitor_filters = direct

; PlatformIO Configuration for Clackpaq Firmware BETA

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 9600
upload_speed = 57600

upload_port = /dev/ttyUSB0

; Build flags
build_flags = 
    -D F_CPU=16000000L
    -O2

; Serial monitor settings
monitor_filters = direct